<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student form</title>

    <!-- font link -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- Linking CSS -->
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <h1>STUDENT FORM</h1>
        <div class="form">
            <form id="One">
                <table border="2" id="table">
                    <tr>
                        <th><label for="name">Name</label></th><td><input id="name"></td>
                    </tr>
                    <tr>
                        <th><label for="age">Age</label></th><td><input id="age"></td>
                    </tr>
                    <tr>
                        <th><label>Gender</label></th><td><input type="radio" name="Gender" value="Male">Male<input type="radio" name="Gender" value="Female">Female</td>
                    </tr>
                    <tr>
                        <th><label for="course">Course</label></th>
                        <td><select id="course">
                            <option value="JavaScript">JavaScript</option>
                            <option value="Python">Python</option>
                            <option value="C++">C++</option>
                            <option value="Java">Java</option>
                            </select>
                        </td>
                    </tr>
                    <tr class="email">
                        <th><label for="email">Email</label></th><td><input type="email" id="email"></td>
                    </tr>
                    <tr>
                        <td colspan="2"><button id="btn" onclick="Save()" type="button">Save</button></td>
                    </tr>
                </table>
            </form>
        </div>
        <div class="result">
            <form>
                <table border="1" id="table2">
                    <tr>
                        <th>NAME</th><th>AGE</th><th>GENDER</th><th>COURSE</th><th class="email">EMAIL</th><th>ACTION</th>
                    </tr>
                </table>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
