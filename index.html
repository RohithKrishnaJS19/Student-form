<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registeration</title>

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Awesome font -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Linking CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="Whole">
        <div class="main">
            <h1>Create Account</h1>
            <div class="container">
                <form id="form">
                    <div class="name">
                        <p><label for="name">Name</label></p>
                        <input id="name" placeholder="Enter your name" type="text">
                        <p class="one" id="Ername">Name is Required!</p>
                    </div>

                    <div class="email">
                        <p><label for="email">Email</label></p>
                        <input id="email" placeholder="Enter your email" type="email">
                        <p class="one" id="Eremail">Email is Required!</p>
                    </div>

                    <div class="password">
                        <p><label for="password">Password</label></p>
                        <div id="imp">
                            <input id="password" placeholder="Enter your password" type="password">
                            <i id="eye" class="fa-solid fa-eye" style="color: rgb(0, 0, 0);"></i>
                        </div>
                        <p class="one" id="Erpassword">Password is Required!</p>
                    </div>
                </form>
            </div>
            <button class="Register" id="btn">Create</button>
            <p id="two">Already Have a account?</p>
            <p id="two">Sign in</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
